name: Link Check

on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  external-links:
    name: external links (live site)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check external links on the live site
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # LinkedIn answers 999 to bots; Credly is auth-walled for some badges —
          # accept their bot-defense codes, verify manually per launch checklist.
          args: >-
            --accept 200,203,206,403,429,999
            --exclude linkedin.com
            https://speedrunby.pages.dev
          fail: false
      - name: Open an issue on failures
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link check: broken external links'
          content-filepath: ./lychee/out.md
          labels: maintenance
