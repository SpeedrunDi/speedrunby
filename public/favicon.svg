<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg { fill: #211c17; }
    .edge { stroke: #e0855c; stroke-opacity: .55; stroke-width: 2.5; }
    .node { fill: #e0855c; }
    .node-hi { fill: #f0a077; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fbf8f2; }
      .edge { stroke: #c25e38; }
      .node { fill: #c25e38; }
      .node-hi { fill: #a94d2a; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="14"/>
  <!-- agent constellation: orchestrator + two satellites -->
  <g class="edge" fill="none">
    <path d="M20 44 L40 22"/>
    <path d="M40 22 L47 40"/>
    <path d="M20 44 L47 40"/>
  </g>
  <circle class="node" cx="20" cy="44" r="5"/>
  <circle class="node-hi" cx="40" cy="22" r="7"/>
  <circle class="node" cx="47" cy="40" r="4"/>
</svg>
